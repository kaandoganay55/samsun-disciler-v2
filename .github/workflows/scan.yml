name: Samsun Diş Klinikleri Taraması

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Taramayı çalıştır
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: python3 api_versiyon.py
      - name: Sonuçları commitle ve yayınla
        run: |
          git config user.name "samsun-disci-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html samsun_disciler_altyapi.csv
          git diff --staged --quiet || git commit -m "Otomatik tarama güncellemesi $(date -u +%Y-%m-%d)"
          git push
